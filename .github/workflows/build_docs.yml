name: Build Docs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "meson-python>=0.15" "Cython>=3.0" "numpy>=1.24" meson ninja

      - name: Install polyxios with doc extras
        run: pip install --no-build-isolation -e ".[doc]"

      - name: Build documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html/
          retention-days: 7
